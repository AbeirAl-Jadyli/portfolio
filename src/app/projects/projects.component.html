<section class="section-component py-5" id="projects">
<div class="container">
    <div class="text-center mb-5">
      <h6 class="text-primary fw-bold">MY PROJECTS</h6>
      <h2 class="text-white fw-bold">Latest Projects</h2>
      <p class="text-secondary">
        Here are some of my recent projects.
      </p>
    </div>

    <div class="row g-4">

      <div class="col-lg-4 col-md-6" *ngFor="let project of projects">

        <div class="card project-card h-100 service-card overflow-hidden">

          <img [src]="project.image"
               class="card-img-top"
               [alt]="project.title">

          <div class="card-body">
            <h5>{{ project.title }}</h5>
            <p>{{ project.description }}</p>
            <div class="mb-3">
              <span
                class="badge bg-primary me-2"
                *ngFor="let tech of project.technologies">
                {{ tech }}
              </span>
            </div>
            <div class="d-flex justify-content-between">
              <button class="btn btn-primary">
                Live Demo
              </button>
              <button class="btn btn-outline-light">
                GitHub
              </button>
            </div>
          </div>

        </div>


      </div>

    </div>
</div>
</section>
